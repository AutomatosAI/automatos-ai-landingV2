<!doctype html>
<html><head><meta charset="utf-8"></head>
<body style="font:18px monospace;padding:24px;background:#fff;color:#000;margin:0">
<iframe src="index.html" style="width:100vw;height:0;border:0;visibility:hidden" id="f"></iframe>
<div id="out" style="white-space:pre-wrap"></div>
<script>
const f = document.getElementById('f');
f.style.height = '6000px';
f.style.visibility = 'visible';
f.addEventListener('load', () => {
  setTimeout(() => {
    const doc = f.contentDocument;
    const lines = [`viewport: ${window.innerWidth}px`, ''];
    ['ch01Img','ch04Img'].forEach(id => {
      const el = doc.getElementById(id);
      if (!el) { lines.push(`${id}: not found`); return; }
      const r = el.getBoundingClientRect();
      lines.push(`${id}: ${Math.round(r.width)}w x ${Math.round(r.height)}h  ratio=${(r.width/r.height).toFixed(3)}  ${r.width>r.height?'LANDSCAPE':'portrait'}`);
    });
    document.getElementById('out').textContent = lines.join('\n');
    f.style.display = 'none';
  }, 2000);
});
</script>
</body></html>
