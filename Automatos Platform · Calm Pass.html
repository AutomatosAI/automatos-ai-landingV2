<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Automatos — calm pass + recommendations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
:root {
  --sans: "Geist", -apple-system, "Helvetica Neue", sans-serif;
  --mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* Current product palette — calmed */
  --bg:        #0A0D0C;
  --bg-2:      #111614;
  --bg-3:      #161C1A;
  --bg-4:      #1C2421;
  --fg:        #E8E6E3;
  --fg-2:      #B5B0A8;
  --muted:     #6F6B62;
  --rule:      rgba(255, 255, 255, 0.07);
  --rule-2:    rgba(255, 255, 255, 0.12);
  --accent:    #F97316;
  --accent-d:  #C25A11;
  --accent-q:  rgba(249, 115, 22, 0.10);
  --green:     #6B9974;
  --amber:     #D9A24E;
  --red:       #C66B5C;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #050706; color: var(--fg); }
body { font-family: var(--sans); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
button { font: inherit; color: inherit; background: 0; border: 0; cursor: pointer; }
a { color: inherit; text-decoration: none; }
::selection { background: var(--accent); color: var(--bg); }

.mono { font-family: var(--mono); }
.eyebrow {
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--muted);
}

/* ─── ARTBOARD ─────────────────────────────────────────────── */
.artboard {
  width: 1440px;
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--rule);
  position: relative;
  overflow: hidden;
}
.app { display: grid; grid-template-columns: 220px 1fr; min-height: 920px; }

/* sidebar */
.sb { background: var(--bg-2); border-right: 1px solid var(--rule); padding: 16px 0; display: flex; flex-direction: column; font-family: var(--mono); font-size: 12px; }
.sb-brand { display: flex; align-items: center; gap: 10px; padding: 0 16px 16px; border-bottom: 1px solid var(--rule); margin-bottom: 12px; }
.sb-mark { width: 22px; height: 22px; background: var(--accent); display: grid; place-items: center; color: var(--bg); font-family: var(--sans); font-weight: 700; font-size: 13px; border-radius: 4px; }
.sb-brand b { font-family: var(--sans); font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
.sb-brand b span { color: var(--muted); font-weight: 400; }
.sb-section { padding: 12px 16px 4px; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); display: flex; justify-content: space-between; }
.sb-item { display: grid; grid-template-columns: 16px 1fr auto; align-items: center; gap: 10px; padding: 7px 16px; color: var(--fg-2); border-left: 2px solid transparent; }
.sb-item:hover { color: var(--fg); background: rgba(255,255,255,0.02); }
.sb-item.active { color: var(--fg); background: var(--accent-q); border-left-color: var(--accent); }
.sb-item .ic { width: 12px; height: 12px; border: 1.2px solid currentColor; border-radius: 2px; }
.sb-item .num { color: var(--muted); font-size: 10px; }
.sb-foot { margin-top: auto; padding: 14px 16px; border-top: 1px solid var(--rule); color: var(--muted); font-size: 11px; display: grid; gap: 6px; }
.sb-foot .live { color: var(--green); display: inline-flex; gap: 6px; align-items: center; }
.sb-foot .live::before { content: ""; width: 6px; height: 6px; background: var(--green); border-radius: 50%; }

/* topbar */
.tb { display: grid; grid-template-columns: 1fr auto auto; gap: 16px; align-items: center; padding: 12px 28px; border-bottom: 1px solid var(--rule); }
.crumbs { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.crumbs b { color: var(--fg); font-weight: 500; }
.crumbs .sep { padding: 0 8px; color: var(--rule-2); }
.tb-search { padding: 7px 12px; border: 1px solid var(--rule); border-radius: 6px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; color: var(--muted); display: inline-flex; gap: 14px; align-items: center; min-width: 320px; }
.tb-search kbd { font-family: var(--mono); font-size: 10px; padding: 1px 6px; border: 1px solid var(--rule); border-radius: 3px; }
.tb-r { display: flex; gap: 6px; }
.btn { padding: 7px 12px; border: 1px solid var(--rule); border-radius: 6px; font-family: var(--sans); font-size: 12px; font-weight: 500; color: var(--fg-2); display: inline-flex; gap: 8px; align-items: center; }
.btn:hover { background: var(--bg-2); color: var(--fg); }
.btn.solid { background: var(--accent); color: #0F0A04; border-color: var(--accent); font-weight: 600; }
.btn.solid:hover { background: #FF8A3D; }
.btn.ghost { color: var(--accent); border-color: rgba(249,115,22,0.3); background: var(--accent-q); }

.main { padding: 24px 28px 32px; }

/* page head — single weight (calm pass) */
.ph { display: grid; grid-template-columns: 1fr auto; align-items: end; gap: 24px; padding-bottom: 18px; border-bottom: 1px solid var(--rule); margin-bottom: 22px; }
.ph h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; color: var(--fg); }
.ph p { margin-top: 6px; color: var(--fg-2); font-size: 14px; max-width: 540px; }
.ph-meta { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; color: var(--muted); display: grid; gap: 4px; text-align: right; text-transform: uppercase; }
.ph-meta b { color: var(--fg); font-weight: 500; }

/* card */
.card { border: 1px solid var(--rule); border-radius: 8px; background: var(--bg-2); display: grid; grid-template-rows: auto 1fr auto; }
.card-h { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--rule); font-size: 13px; font-weight: 500; }
.card-h .lbl { color: var(--fg); display: inline-flex; gap: 8px; align-items: center; }
.card-h .lbl::before { content: ""; width: 6px; height: 6px; background: var(--accent); border-radius: 1px; }
.card-h .meta { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.card-b { padding: 14px; }
.card-f { padding: 10px 14px; border-top: 1px solid var(--rule); font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); display: flex; justify-content: space-between; }
.card-f a { color: var(--accent); }

/* monogram tile (replaces mascot icon) */
.mono-tile {
  width: 32px; height: 32px;
  border: 1px solid var(--rule-2);
  background: var(--bg-3);
  border-radius: 6px;
  display: grid; place-items: center;
  font-family: var(--mono); font-weight: 500; font-size: 11px;
  color: var(--fg);
  letter-spacing: 0.04em;
}
.mono-tile.lg { width: 40px; height: 40px; font-size: 13px; }
.mono-tile.sm { width: 24px; height: 24px; font-size: 9px; border-radius: 4px; }
.mono-tile.accent { border-color: var(--accent); color: var(--accent); }

/* ─── DASHBOARD ────────────────────────────────────────────── */
.grid { display: grid; gap: 14px; grid-template-columns: 1.4fr 1fr 1fr; }
.span2 { grid-column: span 2; }
.span3 { grid-column: span 3; }

/* metric strip — calm version */
.metrics { grid-column: span 3; display: grid; grid-template-columns: repeat(6, 1fr); border: 1px solid var(--rule); border-radius: 8px; background: var(--bg-2); }
.metrics .m { padding: 14px 16px; border-right: 1px solid var(--rule); }
.metrics .m:last-child { border-right: 0; }
.metrics .m .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
.metrics .m .v { font-size: 28px; font-weight: 600; line-height: 1; margin-top: 10px; letter-spacing: -0.02em; }
.metrics .m .v sup { font-family: var(--mono); font-size: 10px; vertical-align: super; color: var(--muted); margin-left: 4px; font-weight: 400; }
.metrics .m .d { margin-top: 8px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; color: var(--green); }
.metrics .m .d.warn { color: var(--amber); }
.metrics .m .d.crit { color: var(--red); }

/* reports — bylined */
.reports-list { display: grid; grid-template-columns: 1fr 1fr; }
.report {
  padding: 14px 16px;
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 12px;
  align-items: start;
}
.report:nth-child(2n) { border-right: 0; }
.report:nth-last-child(-n+2) { border-bottom: 0; }
.report .by { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.report .by b { color: var(--fg); font-weight: 500; }
.report .head { font-size: 14px; line-height: 1.4; margin-top: 4px; color: var(--fg); }
.report .head em { font-style: normal; color: var(--accent); }

/* schedule */
.sched { display: grid; gap: 0; }
.sched-day { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); padding-top: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--rule); }
.sched-day:first-child { padding-top: 0; }
.sched-row { display: grid; grid-template-columns: 56px 1fr auto; gap: 12px; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--rule); font-size: 13px; }
.sched-row:last-child { border-bottom: 0; }
.sched-row .t { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.sched-row .agent { font-family: var(--mono); font-size: 10px; padding: 2px 6px; border: 1px solid var(--rule); border-radius: 3px; text-transform: uppercase; color: var(--fg-2); }

/* workload */
.wload-row { display: grid; grid-template-columns: 90px 1fr 36px; gap: 12px; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--rule); font-family: var(--mono); font-size: 11px; }
.wload-row:last-child { border-bottom: 0; }
.wload-row .name { text-transform: uppercase; }
.wload-row .bar { height: 6px; background: var(--bg-3); border-radius: 2px; position: relative; overflow: hidden; }
.wload-row .bar i { position: absolute; inset: 0 auto 0 0; background: var(--fg-2); }
.wload-row .bar i.hot { background: var(--accent); }
.wload-row .n { text-align: right; color: var(--muted); }

/* cost */
.cost-num { font-size: 36px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; }
.cost-num small { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-top: 6px; font-weight: 400; }
.cost-spark { height: 56px; display: grid; grid-template-columns: repeat(30, 1fr); align-items: end; gap: 2px; margin-top: 12px; }
.cost-spark i { background: var(--fg-2); opacity: 0.3; height: var(--h, 30%); border-radius: 1px; }
.cost-spark i.peak { background: var(--accent); opacity: 1; }
.cost-list { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--rule); display: grid; gap: 4px; }
.cost-list .row { display: grid; grid-template-columns: 70px 1fr auto; gap: 10px; align-items: center; padding: 5px 0; font-family: var(--mono); font-size: 11px; }
.cost-list .row .agent { text-transform: uppercase; color: var(--fg-2); }
.cost-list .row .bar { height: 4px; background: var(--bg-3); border-radius: 1px; }
.cost-list .row .bar i { display: block; height: 100%; background: var(--accent-d); border-radius: 1px; }

/* approvals */
.gate { padding: 12px 0; border-bottom: 1px solid var(--rule); display: grid; grid-template-columns: 28px 1fr auto; gap: 10px; align-items: start; font-size: 13px; }
.gate:last-child { border-bottom: 0; }
.gate .ic { width: 22px; height: 22px; border: 1px solid var(--amber); color: var(--amber); display: grid; place-items: center; font-family: var(--mono); font-size: 10px; border-radius: 4px; margin-top: 2px; }
.gate p { line-height: 1.4; color: var(--fg); }
.gate .meta { margin-top: 4px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.gate .when { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--amber); white-space: nowrap; }

/* perf */
.perf-row { display: grid; grid-template-columns: 80px 1fr 32px; gap: 10px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--rule); font-family: var(--mono); font-size: 11px; }
.perf-row:last-child { border-bottom: 0; }
.perf-row .name { text-transform: uppercase; }
.perf-row .bar { height: 3px; background: var(--bg-3); border-radius: 1px; position: relative; }
.perf-row .bar i { position: absolute; inset: 0 auto 0 0; background: var(--green); border-radius: 1px; }
.perf-row .bar i.warn { background: var(--amber); }
.perf-row .bar i.crit { background: var(--red); }
.perf-row .n { text-align: right; color: var(--muted); }

/* ─── REPORT VIEWER ────────────────────────────────────────── */
.report-shell { display: grid; grid-template-columns: 1fr 320px; min-height: 880px; }
.report-doc { padding: 0 0 60px; max-width: 880px; margin: 0 auto; }
.report-toolbar { padding: 14px 28px; border-bottom: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: center; gap: 16px; }
.report-toolbar .crumbs { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.report-toolbar .crumbs b { color: var(--fg); font-weight: 500; }
.report-toolbar .actions { display: flex; gap: 6px; }

.doc { padding: 56px 64px 48px; background: var(--bg); }
.doc-letterhead {
  display: grid; grid-template-columns: 1fr auto;
  align-items: end;
  padding-bottom: 22px;
  border-bottom: 2px solid var(--accent);
  margin-bottom: 28px;
}
.doc-letterhead .lh-l { display: grid; gap: 6px; }
.doc-stamp { font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); }
.doc-issue { font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
.doc-id { font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); text-align: right; }
.doc-id b { color: var(--fg); font-weight: 500; display: block; font-size: 13px; margin-bottom: 2px; }

.doc-h1 { font-size: 36px; font-weight: 600; letter-spacing: -0.025em; line-height: 1.15; color: var(--fg); margin-bottom: 18px; }

.doc-byline {
  display: grid;
  grid-template-columns: 40px 1fr;
  gap: 14px;
  padding: 14px 0;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  margin-bottom: 28px;
  align-items: center;
}
.doc-byline .who { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); display: flex; gap: 18px; flex-wrap: wrap; }
.doc-byline .who b { color: var(--fg); font-weight: 500; }
.doc-byline .who .agent { color: var(--accent); }

.doc-tldr {
  background: var(--bg-2);
  border-left: 3px solid var(--accent);
  padding: 18px 22px;
  border-radius: 0 6px 6px 0;
  margin-bottom: 32px;
}
.doc-tldr .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
.doc-tldr p { font-size: 16px; line-height: 1.55; color: var(--fg); }

.doc-section { margin-bottom: 32px; }
.doc-h2 { font-size: 13px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); padding-bottom: 8px; border-bottom: 1px solid var(--rule); margin-bottom: 16px; display: flex; justify-content: space-between; }
.doc-h2 .num { font-family: var(--mono); color: var(--accent); }
.doc p { font-size: 15px; line-height: 1.65; color: var(--fg-2); margin-bottom: 12px; }
.doc p b { color: var(--fg); font-weight: 600; }

.doc-findings { display: grid; gap: 0; }
.finding {
  display: grid;
  grid-template-columns: 70px 1fr auto;
  gap: 16px;
  padding: 14px 0;
  border-bottom: 1px solid var(--rule);
  align-items: start;
}
.finding:last-child { border-bottom: 0; }
.finding .sev {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.16em; text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 3px;
  text-align: center;
  white-space: nowrap;
  margin-top: 2px;
}
.finding .sev.high { background: rgba(198, 107, 92, 0.15); color: var(--red); border: 1px solid rgba(198, 107, 92, 0.3); }
.finding .sev.med  { background: rgba(217, 162, 78, 0.15); color: var(--amber); border: 1px solid rgba(217, 162, 78, 0.3); }
.finding .sev.low  { background: rgba(107, 153, 116, 0.15); color: var(--green); border: 1px solid rgba(107, 153, 116, 0.3); }
.finding .body p { margin: 0 0 4px; font-size: 14px; color: var(--fg); line-height: 1.5; }
.finding .body .meta { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.finding .act {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  padding: 6px 10px; border: 1px solid var(--rule-2); border-radius: 4px; color: var(--fg-2);
  white-space: nowrap;
}
.finding .act.primary { color: var(--accent); border-color: var(--accent); }

.doc-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.doc-table th, .doc-table td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--rule); }
.doc-table th { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
.doc-table td.num { font-family: var(--mono); text-align: right; color: var(--fg); }
.doc-table .delta-up { color: var(--green); font-family: var(--mono); font-size: 11px; }
.doc-table .delta-dn { color: var(--red); font-family: var(--mono); font-size: 11px; }

.doc-quote {
  border-left: 2px solid var(--rule-2);
  padding: 4px 0 4px 18px;
  margin: 16px 0;
  font-size: 15px;
  line-height: 1.6;
  color: var(--fg-2);
  font-style: italic;
}

.doc-attach { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
.attach { padding: 12px; border: 1px solid var(--rule); border-radius: 6px; background: var(--bg-2); display: grid; gap: 4px; }
.attach .name { font-family: var(--mono); font-size: 12px; color: var(--fg); display: flex; gap: 8px; align-items: center; }
.attach .name::before { content: "↗"; color: var(--accent); }
.attach .meta { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

.doc-signoff {
  margin-top: 40px;
  padding-top: 24px;
  border-top: 2px solid var(--accent);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}
.signoff-block .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.signoff-block .name { font-size: 16px; font-weight: 500; color: var(--fg); }
.signoff-block .id { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 4px; }
.signature {
  font-family: "Brush Script MT", cursive;
  font-size: 28px;
  color: var(--accent);
  border-bottom: 1px solid var(--rule-2);
  padding-bottom: 6px;
  margin-bottom: 8px;
  font-style: italic;
}

/* report rail */
.report-rail { border-left: 1px solid var(--rule); padding: 22px 22px 32px; display: grid; gap: 24px; align-content: start; background: var(--bg-2); }
.rail-h { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: block; }
.rail-status {
  display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: center;
  padding: 12px; border: 1px solid var(--rule); border-radius: 6px;
}
.rail-status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); }
.rail-status b { display: block; font-size: 13px; font-weight: 500; }
.rail-status span { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.rail-actions { display: grid; gap: 6px; }
.rail-actions .btn { width: 100%; justify-content: center; }
.rail-trail { display: grid; gap: 8px; }
.trail-row { display: grid; grid-template-columns: 8px 1fr; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--rule); font-size: 12px; }
.trail-row:last-child { border-bottom: 0; }
.trail-row .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); margin-top: 6px; }
.trail-row .dot.live { background: var(--green); }
.trail-row .dot.acc { background: var(--accent); }
.trail-row b { font-weight: 500; color: var(--fg); display: block; }
.trail-row .meta { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }

/* ─── CHAT ─────────────────────────────────────────────────── */
.chat-shell { display: grid; grid-template-columns: 1fr 320px; min-height: 880px; }
.chat-main { display: grid; grid-template-rows: auto 1fr auto; border-right: 1px solid var(--rule); }
.chat-head { padding: 18px 28px; border-bottom: 1px solid var(--rule); display: grid; grid-template-columns: 1fr auto; align-items: end; gap: 18px; }
.chat-head h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.015em; }
.chat-meta { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); display: flex; gap: 16px; }
.chat-meta b { color: var(--fg); font-weight: 500; }

.stream { padding: 24px 28px; display: grid; gap: 24px; align-content: start; }
.msg { display: grid; grid-template-columns: 60px 1fr; gap: 16px; }
.msg .gutter { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); text-align: right; padding-top: 4px; border-right: 1px solid var(--rule); padding-right: 12px; }
.msg .gutter b { color: var(--fg); font-weight: 500; display: block; margin-bottom: 2px; }
.msg .gutter time { color: var(--muted); }
.msg-body { display: grid; gap: 12px; }
.msg-body p { font-size: 14px; line-height: 1.6; max-width: 720px; color: var(--fg); }
.msg-body p.lead { font-size: 17px; line-height: 1.5; color: var(--fg); }
.msg-body p em { color: var(--accent); font-style: normal; font-weight: 500; }

/* routing strip — the legible-routing piece */
.routing {
  border: 1px solid var(--rule);
  border-radius: 6px;
  background: var(--bg-2);
  max-width: 720px;
  display: grid;
  grid-template-rows: auto auto auto;
}
.routing-h {
  padding: 10px 14px;
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--rule);
  display: flex; justify-content: space-between;
}
.routing-h b { color: var(--accent); font-weight: 500; }
.routing-flow {
  padding: 14px;
  display: grid;
  grid-template-columns: auto 1fr auto 1fr auto;
  gap: 10px;
  align-items: center;
}
.routing-node { display: grid; gap: 4px; text-align: center; }
.routing-node .mono-tile { margin: 0 auto; }
.routing-node .name { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg); }
.routing-node .role { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.routing-arrow { color: var(--accent); font-family: var(--mono); font-size: 14px; }
.routing-because {
  padding: 10px 14px;
  border-top: 1px solid var(--rule);
  font-family: var(--mono); font-size: 11px;
  color: var(--fg-2);
  letter-spacing: 0.04em;
  display: grid; gap: 4px;
}
.routing-because span { color: var(--muted); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; }

.msg-list { font-family: var(--mono); font-size: 12px; max-width: 720px; line-height: 1.7; display: grid; gap: 2px; }
.msg-list .li { display: grid; grid-template-columns: 14px 1fr; gap: 10px; padding: 4px 0; border-bottom: 1px solid var(--rule); }
.msg-list .li::before { content: "→"; color: var(--accent); }

.cta-row { display: flex; gap: 6px; flex-wrap: wrap; max-width: 720px; }
.chip { padding: 6px 10px; border: 1px solid var(--rule); border-radius: 4px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-2); }
.chip.on { background: var(--accent); color: #0F0A04; border-color: var(--accent); font-weight: 600; }
.chip.ghost { color: var(--accent); border-color: rgba(249,115,22,0.3); }

.composer { border-top: 1px solid var(--rule); background: var(--bg-2); padding: 14px 28px 16px; display: grid; gap: 10px; }
.composer-row { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; }
.composer-pick { padding: 7px 12px; border: 1px solid rgba(249,115,22,0.3); border-radius: 6px; background: var(--accent-q); font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); display: inline-flex; gap: 8px; align-items: center; }
.composer-pick::before { content: ""; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
.composer-field { padding: 10px 0; font-size: 14px; color: var(--muted); }
.composer-send { padding: 8px 16px; background: var(--accent); color: #0F0A04; font-family: var(--sans); font-size: 12px; font-weight: 600; border-radius: 6px; display: inline-flex; gap: 8px; align-items: center; }
.composer-tools { display: flex; gap: 4px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; }
.composer-tool { padding: 5px 10px; border: 1px solid var(--rule); border-radius: 4px; color: var(--muted); }
.composer-tool.on { color: var(--accent); border-color: rgba(249,115,22,0.3); }

/* chat rail */
.chat-rail { padding: 20px 22px; display: grid; gap: 22px; align-content: start; background: var(--bg-2); border-left: 1px solid var(--rule); }
.rail-card { border: 1px solid var(--rule); border-radius: 6px; padding: 14px; display: grid; gap: 8px; background: var(--bg); }
.rail-card .top { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.rail-card .top b { color: var(--accent); font-weight: 500; }
.rail-card h4 { font-size: 15px; font-weight: 500; line-height: 1.3; }
.rail-card .body { font-size: 12px; color: var(--fg-2); line-height: 1.4; }

.team-row { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--rule); font-size: 13px; }
.team-row:last-child { border-bottom: 0; }
.team-row b { font-weight: 500; display: block; font-size: 13px; }
.team-row .meta { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.team-row .now { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--green); padding: 2px 6px; border: 1px solid rgba(107, 153, 116, 0.3); border-radius: 3px; }

/* ─── canvas mount ─────────────────────────────────────────── */
#dc-root { width: 100vw; min-height: 100vh; }
</style>
