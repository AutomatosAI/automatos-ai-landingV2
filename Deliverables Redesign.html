<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Deliverables — Redesign</title>
<meta name="viewport" content="width=1440" />
<style>
  :root {
    --bg: #0a0a0a;
    --bg-2: #111111;
    --surface: #161616;
    --surface-2: #1c1c1c;
    --line: #232323;
    --line-2: #2c2c2c;
    --text: #ededed;
    --text-2: #a8a8a8;
    --text-3: #6e6e6e;
    --orange: #ff6b35;
    --orange-2: #f7931e;
    --orange-soft: rgba(255,107,53,.12);
    --green: #34c759;
    --blue: #4f8cff;
    --purple: #b07cff;
    --red: #ff5a4d;
    --yellow: #ffc857;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
  }
  button { font-family: inherit; cursor: pointer; }
  a { color: inherit; text-decoration: none; }

  /* Layout shell — mimic the existing app chrome lightly so designs feel in-context */
  .app {
    display: grid;
    grid-template-columns: 64px 1fr;
    min-height: 100vh;
  }
  .rail {
    background: #0c0c0c;
    border-right: 1px solid var(--line);
    padding: 14px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .rail-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: grid; place-items: center;
    color: var(--text-3);
    border: 1px solid transparent;
  }
  .rail-icon.active {
    color: var(--orange);
    background: var(--orange-soft);
    border-color: rgba(255,107,53,.25);
  }
  .topbar {
    height: 56px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 14px;
    background: rgba(10,10,10,.85);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; letter-spacing: .04em; font-size: 13px;
  }
  .brand-mark {
    width: 22px; height: 22px; border-radius: 6px;
    background: linear-gradient(135deg, var(--orange) 0%, var(--orange-2) 100%);
  }
  .top-spacer { flex: 1; }
  .top-actions { display: flex; gap: 10px; align-items: center; color: var(--text-2); }
  .top-pill {
    border: 1px solid var(--line-2);
    padding: 4px 10px; border-radius: 999px;
    font-size: 12px; color: var(--text-2);
  }

  .page {
    padding: 32px 36px 80px;
    max-width: 1640px;
  }

  .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; }
  .page-title {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 6px;
  }
  .page-title em {
    font-style: normal;
    background: linear-gradient(135deg, var(--orange) 0%, var(--orange-2) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .page-sub { color: var(--text-2); font-size: 14px; margin: 0; }

  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
  }
  .tab {
    padding: 10px 14px;
    color: var(--text-2);
    font-size: 13.5px;
    border: none; background: transparent;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .tab.active {
    color: var(--text);
    border-bottom-color: var(--orange);
  }
  .tab .count {
    background: var(--surface-2);
    color: var(--text-2);
    font-size: 11px;
    border-radius: 999px;
    padding: 1px 7px;
    border: 1px solid var(--line);
  }
  .tab.active .count { color: var(--orange); border-color: rgba(255,107,53,.3); }

  /* Section headers */
  .section { margin-bottom: 36px; }
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title {
    font-size: 18px; font-weight: 600; letter-spacing: -.005em;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--orange);
  }
  .section-meta { color: var(--text-3); font-size: 12.5px; }
  .section-actions { display: flex; gap: 8px; }
  .ghost-btn {
    background: transparent;
    border: 1px solid var(--line-2);
    color: var(--text-2);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12.5px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .ghost-btn:hover { color: var(--text); border-color: #3a3a3a; }
  .ghost-btn.primary {
    background: linear-gradient(135deg, var(--orange) 0%, var(--orange-2) 100%);
    color: #1a0e08; font-weight: 600; border-color: transparent;
  }

  /* TODAY HERO */
  .today {
    border: 1px solid var(--line);
    background: linear-gradient(180deg, #131313 0%, #0d0d0d 100%);
    border-radius: 18px;
    padding: 22px 24px 4px;
    position: relative;
    overflow: hidden;
  }
  .today::before {
    content: "";
    position: absolute;
    inset: -40% -10% auto auto;
    width: 480px; height: 480px;
    background: radial-gradient(closest-side, rgba(255,107,53,.15), transparent 70%);
    pointer-events: none;
  }
  .today-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 24px;
    margin-bottom: 18px;
    position: relative;
  }
  .today-headline {
    font-size: 24px; font-weight: 600; line-height: 1.2;
    letter-spacing: -.01em;
    max-width: 720px;
  }
  .today-headline strong { color: var(--orange); font-weight: 600; }
  .today-byline { color: var(--text-3); font-size: 13px; margin-top: 6px; }

  .today-stats { display: flex; gap: 6px; flex-wrap: wrap; }
  .stat {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,.03);
    border: 1px solid var(--line-2);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12.5px;
    color: var(--text-2);
  }
  .stat .num { color: var(--text); font-weight: 600; }
  .stat-icon { width: 14px; height: 14px; opacity: .85; }

  .today-strip {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    padding-bottom: 22px;
  }
  .today-card {
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    background: var(--surface);
    transition: transform .15s ease, border-color .15s ease;
  }
  .today-card:hover { border-color: rgba(255,107,53,.4); transform: translateY(-2px); }
  .today-card .thumb {
    aspect-ratio: 4/3;
    background: #1a1612;
    position: relative;
    overflow: hidden;
  }
  .today-card .thumb-meta {
    position: absolute; left: 8px; top: 8px;
    background: rgba(0,0,0,.6); backdrop-filter: blur(6px);
    border-radius: 6px;
    padding: 3px 7px;
    font-size: 10.5px;
    text-transform: uppercase; letter-spacing: .06em;
    color: var(--text-2);
  }
  .today-card .body { padding: 10px 12px 12px; }
  .today-card .title {
    font-size: 13px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .today-card .meta {
    color: var(--text-3); font-size: 11.5px; margin-top: 2px;
  }
  .new-pip {
    display: inline-block; width: 6px; height: 6px;
    background: var(--orange); border-radius: 50%;
    margin-right: 6px;
    box-shadow: 0 0 0 3px rgba(255,107,53,.18);
  }

  /* COLLECTIONS */
  .collections {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .collection {
    border: 1px solid var(--line);
    background: var(--surface);
    border-radius: 16px;
    padding: 16px;
    cursor: pointer;
    transition: all .15s ease;
    position: relative;
  }
  .collection:hover { border-color: rgba(255,107,53,.4); transform: translateY(-2px); }
  .collection-stack {
    position: relative;
    height: 132px;
    margin-bottom: 14px;
  }
  .stack-card {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    border: 1px solid var(--line-2);
    background: var(--surface-2);
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,.4);
  }
  .stack-card.s1 { transform: translate(8px, 8px) rotate(2.5deg); opacity: .55; }
  .stack-card.s2 { transform: translate(4px, 4px) rotate(1deg); opacity: .8; }
  .stack-card.s3 { /* top */ }
  .collection-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
    gap: 10px;
  }
  .collection-title {
    font-size: 15px; font-weight: 600;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1;
  }
  .collection-meta {
    color: var(--text-3); font-size: 12px;
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--line-2);
    background: rgba(255,255,255,.02);
    border-radius: 6px;
    padding: 2px 7px;
    font-size: 11px;
    color: var(--text-2);
  }
  .pill.fresh { color: var(--orange); border-color: rgba(255,107,53,.3); background: rgba(255,107,53,.06); }
  .pill.system { color: var(--text-3); }

  /* SLIDE THUMB MOCKUP — recreate the cream/orange style of their actual decks */
  .slide-thumb {
    width: 100%; height: 100%;
    background: #f6f1e6;
    color: #1a1714;
    padding: 14px 12px 10px;
    font-family: 'Georgia', serif;
    position: relative;
    display: flex; flex-direction: column;
    justify-content: space-between;
  }
  .slide-thumb.alt { background: #1a1714; color: #f6f1e6; }
  .slide-thumb h4 {
    margin: 0;
    font-size: 18px; font-weight: 800;
    line-height: 1; letter-spacing: -.01em;
  }
  .slide-thumb h4 .accent { color: var(--orange); }
  .slide-thumb .tagline {
    font-size: 9px;
    text-transform: uppercase; letter-spacing: .14em;
    opacity: .55;
    font-family: -apple-system, sans-serif;
    font-weight: 600;
  }
  .slide-thumb .quote {
    font-size: 11px; font-style: italic; line-height: 1.3;
    margin-top: 4px;
  }
  .slide-thumb .footer {
    font-size: 8px; opacity: .5;
    font-family: -apple-system, sans-serif;
    letter-spacing: .08em;
    text-transform: uppercase;
    display: flex; justify-content: space-between;
  }

  /* REPORT THUMB */
  .report-thumb {
    width: 100%; height: 100%;
    background: linear-gradient(160deg, #182030 0%, #0e1420 100%);
    padding: 12px;
    display: flex; flex-direction: column; gap: 6px;
    position: relative;
  }
  .report-thumb .rh {
    height: 6px; width: 60%;
    background: rgba(79,140,255,.5); border-radius: 3px;
  }
  .report-thumb .rl { height: 4px; background: rgba(255,255,255,.07); border-radius: 2px; }
  .report-thumb .rl.short { width: 70%; }
  .report-thumb .rl.med { width: 88%; }
  .report-thumb .chart {
    margin-top: auto;
    height: 38px;
    border-radius: 4px;
    background:
      linear-gradient(90deg, transparent 0 14%, rgba(79,140,255,.4) 14% 30%, transparent 30% 38%, rgba(79,140,255,.55) 38% 56%, transparent 56% 64%, rgba(79,140,255,.7) 64% 82%, transparent 82% 100%) bottom/100% 70% no-repeat,
      rgba(255,255,255,.02);
  }

  /* IMAGE THUMB */
  .img-thumb {
    width: 100%; height: 100%;
    background:
      radial-gradient(circle at 30% 40%, rgba(255,107,53,.5), transparent 50%),
      radial-gradient(circle at 70% 60%, rgba(176,124,255,.4), transparent 55%),
      linear-gradient(135deg, #2a1a3a 0%, #1a1430 100%);
  }
  .img-thumb.bw {
    background: linear-gradient(135deg, #2a2a2a, #0e0e0e);
  }
  .img-thumb.warm {
    background:
      radial-gradient(circle at 50% 30%, rgba(255,200,87,.4), transparent 55%),
      linear-gradient(135deg, #3a2418 0%, #1d1410 100%);
  }

  /* DOC THUMB */
  .doc-thumb {
    width: 100%; height: 100%;
    background: #f8f6f2;
    color: #1a1714;
    padding: 10px 9px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .doc-thumb .h { height: 5px; width: 50%; background: #1a1714; border-radius: 2px; }
  .doc-thumb .l { height: 3px; background: #cfc9bd; border-radius: 1px; }
  .doc-thumb .l.s { width: 70%; }
  .doc-thumb .l.m { width: 90%; }
  .doc-thumb .l.l { width: 100%; }

  /* TYPE ROWS — netflix style */
  .type-row { margin-bottom: 28px; }
  .row-track {
    display: flex; gap: 12px;
    overflow-x: auto;
    scrollbar-width: thin;
    padding-bottom: 8px;
    scroll-snap-type: x proximity;
  }
  .row-track::-webkit-scrollbar { height: 6px; }
  .row-track::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }

  .type-card {
    flex: 0 0 auto;
    width: 220px;
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    background: var(--surface);
    scroll-snap-align: start;
    transition: all .15s ease;
  }
  .type-card:hover { border-color: rgba(255,107,53,.4); transform: translateY(-2px); }
  .type-card .thumb { aspect-ratio: 4/3; background: var(--surface-2); }
  .type-card .body { padding: 10px 12px 12px; }
  .type-card .body .title {
    font-size: 13px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .type-card .body .meta {
    color: var(--text-3); font-size: 11.5px; margin-top: 3px;
  }

  .type-card.tall { width: 200px; }
  .type-card.tall .thumb { aspect-ratio: 3/4; }

  /* SYSTEM (heartbeat) row — demoted */
  .system-strip {
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--bg-2);
    padding: 14px 18px;
  }
  .system-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .system-title { color: var(--text-2); font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .system-title-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); }
  .system-rows { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px 24px; }
  .system-row {
    display: grid;
    grid-template-columns: 22px 1fr auto auto;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    color: var(--text-2);
    font-size: 12.5px;
    border-bottom: 1px solid var(--line);
  }
  .system-row:nth-last-child(-n+2) { border-bottom: none; }
  .system-row .name { color: var(--text); font-weight: 500; }
  .system-row .agent { color: var(--text-3); font-size: 11.5px; }
  .system-row .ago { color: var(--text-3); font-size: 11.5px; }
  .system-icon {
    width: 18px; height: 18px;
    border-radius: 4px;
    background: var(--surface-2);
    display: grid; place-items: center;
    color: var(--text-3);
  }
  .status-ok { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; }
  .status-warn { background: var(--yellow); }

  /* DETAIL VIEW */
  .detail {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 24px;
  }
  .detail-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-2);
    background: transparent; border: none;
    margin-bottom: 14px;
    font-size: 13px;
  }
  .detail-back:hover { color: var(--orange); }
  .detail-hero {
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px;
    background: var(--surface);
  }
  .detail-title { font-size: 26px; font-weight: 700; letter-spacing: -.01em; margin: 0 0 4px; }
  .detail-sub { color: var(--text-2); font-size: 14px; margin: 0 0 18px; }
  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .detail-grid .type-card { width: 100%; }
  .detail-aside {
    display: flex; flex-direction: column; gap: 16px;
  }
  .aside-card {
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--surface);
    padding: 16px;
  }
  .aside-card h4 { margin: 0 0 10px; font-size: 13px; color: var(--text-2); font-weight: 600; letter-spacing: .03em; text-transform: uppercase; }
  .timeline { display: flex; flex-direction: column; gap: 10px; }
  .timeline-item {
    display: grid; grid-template-columns: 18px 1fr auto;
    gap: 10px; align-items: center;
    font-size: 13px;
  }
  .timeline-item .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--orange);
    margin: 0 auto;
  }
  .timeline-item .agent { color: var(--text-3); font-size: 11.5px; }
  .timeline-item .when { color: var(--text-3); font-size: 11.5px; }

  .breadcrumb {
    color: var(--text-3); font-size: 12.5px; margin-bottom: 6px;
  }
  .breadcrumb .sep { margin: 0 8px; color: var(--line-2); }

  /* INTRO BANNER */
  .intro {
    border: 1px dashed rgba(255,107,53,.3);
    background: rgba(255,107,53,.04);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 28px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 14px;
    align-items: flex-start;
  }
  .intro-mark {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--orange) 0%, var(--orange-2) 100%);
    display: grid; place-items: center;
    color: #1a0e08;
    font-weight: 800;
  }
  .intro h3 { margin: 0 0 4px; font-size: 14px; font-weight: 600; }
  .intro p { margin: 0; color: var(--text-2); font-size: 13px; line-height: 1.55; }
  .intro p + p { margin-top: 6px; }
  .intro b { color: var(--text); font-weight: 600; }

</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="deliverables-app.jsx"></script>
</body>
</html>
