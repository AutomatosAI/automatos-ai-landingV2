<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Automatos — Deliverable Icons v1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0a0e;
      --bg-elev:   #0e0d12;
      --bg-card:   #14110f;
      --line:      rgba(255,255,255,0.06);
      --line-2:    rgba(255,255,255,0.10);
      --ink:       #f9fafb;
      --ink-2:     #cbd5e1;
      --muted:     #94a3b8;
      --muted-2:   #64748b;
      --accent:    #fdba74;   /* automatos warm */
      --brick:     #FF6932;
      --code:      #fed7aa;
      --code-bg:   rgba(249,115,22,0.08);
    }
    html, body {
      margin: 0; padding: 0; background: var(--bg);
      color: var(--ink); font-family: Inter, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; min-height: 100vh;
    }
    body { padding: 56px 56px 120px; }
    .wrap { max-width: 1320px; margin: 0 auto; }

    /* ── Brief / hero card ──────────────────────────────────── */
    .brief {
      background: linear-gradient(135deg, #14110f, #0e0d12);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 36px 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      margin-bottom: 48px;
    }
    .meta {
      font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
      color: var(--muted-2); letter-spacing: 1.4px;
      text-transform: uppercase; margin-bottom: 14px;
    }
    .meta b { color: var(--accent); font-weight: 600; }
    h1 {
      font-family: Inter, sans-serif; font-size: 32px; font-weight: 700;
      margin: 0 0 12px; letter-spacing: -0.7px; color: var(--ink);
    }
    .lede { color: var(--muted); font-size: 14.5px; line-height: 1.7; max-width: 880px; margin: 0 0 14px; }
    code {
      font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
      color: var(--code); background: var(--code-bg);
      padding: 2px 6px; border-radius: 3px;
    }
    .accent { color: var(--accent); }

    /* ── Section headers ───────────────────────────────────── */
    section { margin-bottom: 56px; }
    .sec-head {
      display: flex; align-items: baseline; gap: 16px;
      padding-bottom: 14px; margin-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }
    .sec-num {
      font-family: 'JetBrains Mono', monospace; color: var(--brick);
      font-size: 12px; letter-spacing: 1.4px; font-weight: 600;
    }
    .sec-title {
      font-family: Inter, sans-serif; font-size: 22px; font-weight: 700;
      letter-spacing: -0.4px; color: var(--ink);
    }
    .sec-sub {
      font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
      color: var(--muted-2); margin-left: auto;
    }

    /* ── Hero grid ─────────────────────────────────────────── */
    .hero-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }
    @media (max-width: 1100px) { .hero-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 820px)  { .hero-grid { grid-template-columns: repeat(2, 1fr); } }

    .hero-cell {
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 24px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .hero-cell .art {
      border-radius: 14px; overflow: hidden;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,0.4));
    }
    .hero-cell .label {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
      color: var(--muted); letter-spacing: 0.4px;
    }
    .hero-cell .label .slug { color: var(--ink-2); font-weight: 600; }
    .hero-cell .label .swatch {
      width: 10px; height: 10px; border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1);
    }
    .hero-cell .file {
      font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
      color: var(--muted-2);
    }

    /* ── Row + Badge tables ────────────────────────────────── */
    .mono-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px;
      background: var(--bg-elev); border: 1px solid var(--line);
      border-radius: 14px; padding: 22px;
    }
    @media (max-width: 920px) { .mono-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 560px) { .mono-grid { grid-template-columns: repeat(2, 1fr); } }

    .mono-cell {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      padding: 18px 8px 14px;
      border: 1px dashed var(--line-2); border-radius: 10px;
      background: rgba(255,255,255,0.015);
    }
    .mono-cell .icon-stage {
      display: flex; align-items: center; justify-content: center;
      width: 64px; height: 64px;
    }
    .mono-cell.badge .icon-stage { width: 48px; height: 48px; }
    .mono-cell .name {
      font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
      color: var(--ink-2); letter-spacing: 0.4px; text-align: center;
    }
    .mono-cell .hex {
      font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
      color: var(--muted-2);
    }

    /* ── Lucide adjacency strip ────────────────────────────── */
    .strip {
      display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
      background: var(--bg-elev); border: 1px solid var(--line);
      border-radius: 12px; padding: 18px 20px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      color: var(--ink-2);
    }
    .strip .grp {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; border-radius: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
    }
    .strip .grp svg { display: block; }
    .strip .lbl { color: var(--muted); }
    .strip .x { color: var(--muted-2); }

    /* ── Usage row ────────────────────────────────────────── */
    .usage {
      background: var(--bg-elev); border: 1px solid var(--line);
      border-radius: 14px; padding: 22px 24px;
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;
    }
    @media (max-width: 900px) { .usage { grid-template-columns: 1fr; } }
    .usage .col h4 {
      font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
      color: var(--accent); letter-spacing: 1.3px; text-transform: uppercase;
      margin: 0 0 10px;
    }
    .usage .col p {
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      color: var(--muted); line-height: 1.65; margin: 0;
    }

    /* ── Spec table ────────────────────────────────────────── */
    .spec {
      background: var(--bg-elev); border: 1px solid var(--line);
      border-radius: 14px; padding: 22px 26px;
      font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
      color: var(--muted); line-height: 1.7;
    }
    .spec .row { display: grid; grid-template-columns: 180px 1fr; gap: 14px; padding: 6px 0;
      border-bottom: 1px dashed var(--line-2); }
    .spec .row:last-child { border-bottom: 0; }
    .spec .k { color: var(--code); }
    .spec .v { color: var(--ink-2); }

    /* ── In-context demo: dropdown + list row ─────────────── */
    .demo-grid {
      display: grid; grid-template-columns: 360px 1fr; gap: 24px;
    }
    @media (max-width: 820px) { .demo-grid { grid-template-columns: 1fr; } }

    .demo-card {
      background: var(--bg-elev); border: 1px solid var(--line);
      border-radius: 14px; padding: 20px;
    }
    .demo-card h4 {
      font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
      color: var(--accent); letter-spacing: 1.3px; text-transform: uppercase;
      margin: 0 0 14px;
    }

    /* dropdown */
    .ddown { display: flex; flex-direction: column; gap: 2px; }
    .ddown .item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 6px;
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      color: var(--ink-2); cursor: default;
    }
    .ddown .item:hover { background: rgba(255,255,255,0.04); }
    .ddown .item .kbd {
      margin-left: auto; font-size: 10.5px; color: var(--muted-2);
    }
    .ddown .header {
      font-size: 10.5px; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--muted-2);
      padding: 6px 10px 10px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* list rows */
    .rows { display: flex; flex-direction: column; gap: 4px; }
    .rrow {
      display: grid; grid-template-columns: 28px 1fr 90px 100px;
      align-items: center; gap: 14px;
      padding: 12px 14px; border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.015);
    }
    .rrow .name { color: var(--ink); font-size: 13.5px; font-weight: 500; }
    .rrow .meta { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--muted); }

    /* tab nav demo */
    .tabs {
      display: flex; gap: 4px; padding: 6px;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--line); border-radius: 10px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .tabs .tab {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 10px; border-radius: 6px;
      font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
      color: var(--muted); letter-spacing: 0.3px;
    }
    .tabs .tab.active {
      background: rgba(255,255,255,0.06);
      color: var(--ink);
    }
    .tabs .tab .count {
      color: var(--muted-2); font-size: 10.5px;
    }

    /* color pills for accent class names */
    .text-blue-400   { color: #60a5fa; }
    .text-purple-400 { color: #c084fc; }
    .text-slate-300  { color: #cbd5e1; }
    .text-emerald-400{ color: #34d399; }
    .text-orange-400 { color: #fb923c; }
    .text-green-400  { color: #4ade80; }
    .text-cyan-400   { color: #22d3ee; }

    /* lucide reference */
    .lucide { width: 18px; height: 18px; stroke-width: 1.5; }

    /* note callout */
    .note {
      background: rgba(255,105,50,0.07);
      border: 1px dashed rgba(255,138,92,0.45);
      border-radius: 10px;
      padding: 14px 18px;
      margin-top: 16px;
      font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
      color: var(--muted); line-height: 1.65;
    }
    .note .tag { color: var(--brick); font-weight: 600; }

    /* light/dark hero toggle effect on canvas */
    body[data-bg="light"] .hero-cell { background: #f4eee2; border-color: rgba(0,0,0,0.06); }
    body[data-bg="light"] .hero-cell .label .slug { color: #14110f; }
    body[data-bg="light"] .hero-cell .label { color: #6b6256; }
    body[data-bg="light"] .hero-cell .file { color: #948b7c; }
  </style>
</head>
<body>
  <div class="wrap" id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons/deliverable-icons.jsx"></script>

  <script type="text/babel">
    const { ACCENTS, HERO, ROW, BADGE, TweaksPanel, useTweaks,
            TweakSection, TweakRadio, TweakColor, TweakToggle } = window;

    const TYPES = ['report','image','document','code','slide','spreadsheet','blog_post'];

    // Lucide reference set — visual-weight peers Row/Badge sit beside.
    // Reproduced from lucide.dev (ISC license) — used only as a reference scale.
    const Lucide = {
      Filter: () => (
        <svg className="lucide" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" xmlns="http://www.w3.org/2000/svg">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
        </svg>
      ),
      Calendar: () => (
        <svg className="lucide" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8"  y1="2" x2="8"  y2="6" />
          <line x1="3"  y1="10" x2="21" y2="10" />
        </svg>
      ),
      Search: () => (
        <svg className="lucide" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="7" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      ),
    };

    const DEFAULTS = /*EDITMODE-BEGIN*/{
      "blogHue": "#22d3ee",
      "showLucide": true,
      "showInContext": true
    }/*EDITMODE-END*/;

    // ── Brief / page header
    const Brief = () => (
      <div className="brief">
        <div className="meta">
          design · <b>Automatos / deliverable icons v1</b> · 7 types × 3 sizes · 21 svgs
        </div>
        <h1>Deliverable Icons — Hero, Row, Badge</h1>
        <p className="lede">
          One icon family across three artboards. <span className="accent">Hero (200×200)</span> sits on a near-black canvas with a subtle radial gradient toward the type's accent — restrained "glyph-on-canvas" rather than mini scenes, so the visual weight rhymes when shrunk down. <span className="accent">Row (24×24)</span> and <span className="accent">Badge (16×16)</span> are monochrome single-path-style outlines using <code>currentColor</code>, drawn at lucide weight (stroke 1.5, round caps + joins) so they sit next to <code>Filter</code>, <code>Calendar</code>, etc. without looking heavier.
        </p>
        <p className="lede" style={{marginBottom: 0}}>
          Blog Posts gets <code>cyan #22d3ee</code> as the proposed accent — it's the only unused warm/cool pair from the Tailwind palette already in play (blue/purple/green/orange/emerald/slate). Tweak it live in the panel if you want to A/B another hue.
        </p>
      </div>
    );

    // ── HERO section
    const HeroSection = () => (
      <section>
        <div className="sec-head">
          <span className="sec-num">01</span>
          <span className="sec-title">Hero — 200 × 200</span>
          <span className="sec-sub">grid card cover · multi-element · accent + dark canvas</span>
        </div>

        <div className="hero-grid">
          {TYPES.map(t => {
            const Icon = HERO[t]; const a = ACCENTS[t];
            return (
              <div className="hero-cell" key={t}>
                <div className="art"><Icon /></div>
                <div className="label">
                  <span className="slug">{a.name}</span>
                  <span style={{display:'inline-flex', alignItems:'center', gap: 8}}>
                    <span className="swatch" style={{background: a.hex}}></span>
                    {a.hex}
                  </span>
                </div>
                <div className="file">{t}-hero.svg</div>
              </div>
            );
          })}
        </div>

        <div className="note">
          <span className="tag">canvas · </span>
          Background is <code>#0a0d14</code> with a <code>radialGradient</code> centered slightly above the icon (<code>cx 50%, cy 35%, r 70%</code>). Stops: accent @ 18% → accent @ 4% → transparent. Same recipe across all 7 types — only the hue changes. Container <code>rx 14</code> for the rounded card cover.
        </div>
      </section>
    );

    // ── ROW section
    const RowSection = () => (
      <section>
        <div className="sec-head">
          <span className="sec-num">02</span>
          <span className="sec-title">Row — 24 × 24</span>
          <span className="sec-sub">list rows · dropdown items · filter trigger</span>
        </div>

        <div className="mono-grid">
          {TYPES.map(t => {
            const Icon = ROW[t]; const a = ACCENTS[t];
            return (
              <div className="mono-cell" key={t}>
                <div className={`icon-stage ${a.tw}`}>
                  <Icon />
                </div>
                <div className="name">{t}</div>
                <div className="hex">{a.tw}</div>
              </div>
            );
          })}
        </div>

        <div className="strip" style={{marginTop: 20}}>
          <span className="lbl">visual weight check ·</span>
          <div className="grp"><Lucide.Filter /><span>Filter</span></div>
          <div className="grp"><Lucide.Calendar /><span>Calendar</span></div>
          <div className="grp"><Lucide.Search /><span>Search</span></div>
          <span className="x">vs. ours →</span>
          <div className="grp"><div className="text-blue-400">{(()=>{const I=ROW.report; return <I/>;})()}</div><span>Reports</span></div>
          <div className="grp"><div className="text-emerald-400">{(()=>{const I=ROW.code; return <I/>;})()}</div><span>Code</span></div>
          <div className="grp"><div className="text-cyan-400">{(()=>{const I=ROW.blog_post; return <I/>;})()}</div><span>Blog</span></div>
        </div>
      </section>
    );

    // ── BADGE section
    const BadgeSection = () => (
      <section>
        <div className="sec-head">
          <span className="sec-num">03</span>
          <span className="sec-title">Badge — 16 × 16</span>
          <span className="sec-sub">tab nav · inline labels · source-pill nesting</span>
        </div>

        <div className="mono-grid">
          {TYPES.map(t => {
            const Icon = BADGE[t]; const a = ACCENTS[t];
            return (
              <div className="mono-cell badge" key={t}>
                <div className={`icon-stage ${a.tw}`}><Icon /></div>
                <div className="name">{t}</div>
                <div className="hex">{a.tw}</div>
              </div>
            );
          })}
        </div>

        <div className="note">
          <span className="tag">redrawn, not downscaled · </span>
          Each Badge is a fresh path optimised for 16px — slightly thicker proportions, fewer detail rows, larger glyph fills. The Spreadsheet badge keeps its 4-line grid; Document drops one body line; Slide simplifies the deck stack into a single card with a header bar.
        </div>
      </section>
    );

    // ── In-context demo
    const InContext = ({show}) => {
      if (!show) return null;
      return (
        <section>
          <div className="sec-head">
            <span className="sec-num">04</span>
            <span className="sec-title">In context</span>
            <span className="sec-sub">drop-in surfaces these icons replace</span>
          </div>

          {/* Tab nav using badge size */}
          <div className="tabs">
            {[
              {k:'all',         label:'All',          n:248, icon: null},
              {k:'report',      label:'Reports',      n: 42},
              {k:'image',       label:'Images',       n: 86},
              {k:'document',    label:'Documents',    n: 31},
              {k:'code',        label:'Code',         n: 24},
              {k:'slide',       label:'Slides',       n: 18},
              {k:'spreadsheet', label:'Spreadsheets', n: 11},
              {k:'blog_post',   label:'Blog Posts',   n:  7},
            ].map(({k,label,n}) => {
              const I = k === 'all' ? null : BADGE[k];
              const a = k === 'all' ? null : ACCENTS[k];
              return (
                <span className={`tab ${k==='image' ? 'active' : ''}`} key={k}>
                  {I && <span className={a.tw}><I /></span>}
                  <span>{label}</span>
                  <span className="count">{n}</span>
                </span>
              );
            })}
          </div>

          <div className="demo-grid">
            {/* Dropdown */}
            <div className="demo-card">
              <h4>"All types" dropdown</h4>
              <div className="ddown">
                <div className="header">filter by type</div>
                {TYPES.map(t => {
                  const Icon = ROW[t]; const a = ACCENTS[t];
                  return (
                    <div className="item" key={t}>
                      <span className={a.tw}><Icon /></span>
                      <span>{a.name}</span>
                      <span className="kbd">⌘ {TYPES.indexOf(t)+1}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* List rows */}
            <div className="demo-card">
              <h4>Gallery list rows</h4>
              <div className="rows">
                {[
                  {t:'report',      name:'Q3 retention deep-dive',           by:'mission-04', ago:'2h'},
                  {t:'spreadsheet', name:'pricing_v17.xlsx',                  by:'kim',        ago:'5h'},
                  {t:'slide',       name:'Series-B teaser deck — draft',     by:'mission-02', ago:'1d'},
                  {t:'code',        name:'harness/loop.ts',                   by:'mission-09', ago:'1d'},
                  {t:'blog_post',   name:'Why the harness, not the model',    by:'editorial',  ago:'2d'},
                  {t:'image',       name:'cover_horizon_render.png',          by:'mission-07', ago:'2d'},
                  {t:'document',    name:'agent-spec-v2.md',                  by:'kim',        ago:'3d'},
                ].map((r, i) => {
                  const Icon = ROW[r.t]; const a = ACCENTS[r.t];
                  return (
                    <div className="rrow" key={i}>
                      <span className={a.tw} style={{display:'inline-flex'}}><Icon /></span>
                      <span className="name">{r.name}</span>
                      <span className="meta">{r.by}</span>
                      <span className="meta" style={{textAlign:'right'}}>{r.ago} ago</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </section>
      );
    };

    // ── Spec / handoff
    const SpecSection = () => (
      <section>
        <div className="sec-head">
          <span className="sec-num">05</span>
          <span className="sec-title">Handoff spec</span>
          <span className="sec-sub">drop-in for deliverable-row.tsx + deliverable-artwork.tsx</span>
        </div>

        <div className="usage">
          <div className="col">
            <h4>row + badge</h4>
            <p>
              Single <code>{`<svg>`}</code> with <code>stroke="currentColor"</code>. Color via Tailwind class on parent, e.g. <code>{`<span class="text-cyan-400">`}</code> for blog. Stroke 1.5, round caps + joins.
            </p>
          </div>
          <div className="col">
            <h4>hero</h4>
            <p>
              Self-contained — accent baked into the gradient + strokes. Per-instance theming optional via a <code>color</code> prop that swaps every <code>{`{a}`}</code> reference. Same canvas, same gradient recipe, same stroke weights across all 7.
            </p>
          </div>
          <div className="col">
            <h4>file layout</h4>
            <p>
              <code>frontend/public/icons/deliverables/{`{type}`}-{`{size}`}.svg</code> for static svgs, or one <code>{`<DeliverableIcon type size />`}</code> component that picks among 21 inline svgs.
            </p>
          </div>
        </div>

        <div className="spec" style={{marginTop: 20}}>
          {[
            {k: 'report',      v: 'blue #60a5fa · text-blue-400'},
            {k: 'image',       v: 'purple #c084fc · text-purple-400'},
            {k: 'document',    v: 'slate #cbd5e1 · text-slate-300'},
            {k: 'code',        v: 'emerald #34d399 · text-emerald-400'},
            {k: 'slide',       v: 'orange #fb923c · text-orange-400'},
            {k: 'spreadsheet', v: 'green #4ade80 · text-green-400'},
            {k: 'blog_post',   v: 'cyan #22d3ee · text-cyan-400  ← new'},
          ].map((r, i) => (
            <div className="row" key={i}>
              <span className="k">{r.k}</span>
              <span className="v">{r.v}</span>
            </div>
          ))}
          <div className="row">
            <span className="k">canvas</span>
            <span className="v">#0a0d14 · rx 14 · radial gradient cx50% cy35% r70% · 18→4→0% accent</span>
          </div>
          <div className="row">
            <span className="k">stroke</span>
            <span className="v">1.5 (row + badge) · 1.5–2.25 (hero, layered) · round caps + joins</span>
          </div>
          <div className="row">
            <span className="k">corner radii</span>
            <span className="v">1.5–2 (small rects) · 4–6 (frames) · 14 (hero canvas)</span>
          </div>
        </div>

        <div className="note">
          <span className="tag">designer's read · </span>
          Pulled the Hero detail back from "mini illustration" toward "glyph-on-canvas with one supporting element" — the bar chart still climbs, the spreadsheet still highlights one cell, the slide deck still stacks — but everything reduces cleanly to a row + badge silhouette. Visual weight is consistent so a wall of mixed types in the gallery view reads as one family, not seven.
        </div>
      </section>
    );

    // ── Tweaks
    const Tweaks = () => {
      const [tw, setTw] = useTweaks(DEFAULTS);
      // Apply blog hue live by mutating ACCENTS (re-render via key)
      React.useEffect(() => {
        ACCENTS.blog_post.hex = tw.blogHue;
      }, [tw.blogHue]);
      return (
        <TweaksPanel title="Tweaks">
          <TweakSection title="Blog Post accent">
            <TweakColor label="Hue" value={tw.blogHue}
              onChange={v => setTw('blogHue', v)} />
            <TweakRadio label="Quick picks" value={tw.blogHue}
              onChange={v => setTw('blogHue', v)}
              options={[
                {value: '#22d3ee', label: 'cyan'},
                {value: '#f472b6', label: 'pink'},
                {value: '#facc15', label: 'amber'},
                {value: '#a78bfa', label: 'violet'},
              ]} />
          </TweakSection>
          <TweakSection title="Sections">
            <TweakToggle label="Show in-context demo"
              value={tw.showInContext} onChange={v => setTw('showInContext', v)} />
          </TweakSection>
        </TweaksPanel>
      );
    };

    const App = () => {
      const [tw] = useTweaks(DEFAULTS);
      // Force re-render on blogHue change by keying the hero/row/badge sections
      const k = tw.blogHue + ':' + tw.showInContext;
      return (
        <>
          <Brief />
          <HeroSection key={'h'+k} />
          <RowSection key={'r'+k} />
          <BadgeSection key={'b'+k} />
          <InContext show={tw.showInContext} key={'c'+k} />
          <SpecSection key={'s'+k} />
          <Tweaks />
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
